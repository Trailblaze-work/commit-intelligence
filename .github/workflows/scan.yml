name: Scan Commits
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t commit-intelligence .

      - name: Run scan + analyze + dashboard
        run: |
          docker run \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/docs:/app/docs \
            -e GITHUB_TOKEN=${{ secrets.ORG_TOKEN }} \
            commit-intelligence run --org Trailblaze-work

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Update commit data and dashboard"
          git push
